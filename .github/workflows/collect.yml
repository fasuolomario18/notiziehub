name: collect

# Loop di automazione (brief sez. 5): aggiorna i dati e scrive lo storico datato.
on:
  schedule:
    - cron: "0 */12 * * *" # ogni 12 ore
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Aggiorna canali esistenti + storico (priorità, poca quota)
        run: npm run collect
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Scoperta nuovi canali (usa la quota residua, errori tollerati)
        run: npm run discover || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Anime + Film + Serie TV (AniList gratis, TMDB se chiave)
        run: npm run media || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
